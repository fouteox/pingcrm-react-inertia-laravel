apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: ingress-patch.yaml

images:
  - name: pingcrm-app
    newName: k3d-registry.localhost:5111/pingcrm
    newTag: latest
  - name: pingcrm-ssr
    newName: k3d-registry.localhost:5111/pingcrm
    newTag: ssr
