apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverb
  namespace: pingcrm
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: reverb
  template:
    metadata:
      labels:
        app: reverb
    spec:
      securityContext:
        fsGroup: 33
      containers:
        - name: reverb
          image: pingcrm-app:latest
          imagePullPolicy: Always
          command: ["php", "/var/www/html/artisan", "reverb:start", "--port=8080"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: dotenv
              mountPath: /var/www/html/.env
              subPath: .env
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: dotenv
          secret:
            secretName: app-dotenv
