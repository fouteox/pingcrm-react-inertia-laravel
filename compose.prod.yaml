x-logging: &default-logging
  driver: 'json-file'
  options:
    max-size: "50m"
    max-file: 6
x-network: &default-network
  internal:
x-base: &base
  image: ${IMAGE_NAME:-app}:latest
  secrets:
    - source: laravel_env
      target: /var/www/html/.env
      uid: "33"
      gid: "33"
      mode: 0440
  ulimits:
    nofile:
      soft: 20000
      hard: 40000
  security_opt:
    - no-new-privileges:true
  volumes:
    - 'storage_private:/var/www/html/storage/app/private/'
    - 'storage_public:/var/www/html/storage/app/public'
    - 'storage_sessions:/var/www/html/storage/framework/sessions'
    - 'storage_logs:/var/www/html/storage/logs'
  logging: *default-logging
  restart: always

services:
  app:
    <<: *base
    build:
      target: app
    command: ["php", "/var/www/html/artisan", "octane:start", "--server=frankenphp", "--port=8000"]
    stop_signal: SIGTERM
    environment:
      AUTORUN_ENABLED: "true"
      AUTORUN_LARAVEL_MIGRATION_MODE: "fresh"
      AUTORUN_LARAVEL_MIGRATION_SEED: "true"
      INERTIA_SSR_URL: "http://ssr:13714"
      INERTIA_SSR_ENSURE_BUNDLE_EXISTS: "false"
      HEALTHCHECK_PATH: "/up"
      PHP_OPCACHE_ENABLE: "1"
    depends_on:
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
      ssr:
        condition: service_healthy
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD", "healthcheck-octane"]
      start_period: 90s
      interval: 10s
      timeout: 10s
      retries: 3
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.pingcrm.rule: "Host(`${APP_HOST}`)"
      traefik.http.services.pingcrm.loadbalancer.server.port: "8000"

  queue:
    <<: *base
    command: ["php", "/var/www/html/artisan", "queue:work", "--tries=3", "--max-time=3600"]
    stop_signal: SIGTERM
    stop_grace_period: 60s
    depends_on:
      app:
        condition: service_healthy
    networks: *default-network
    healthcheck:
      test: ["CMD", "healthcheck-queue"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 2

  scheduler:
    <<: *base
    command: ["php", "/var/www/html/artisan", "schedule:work"]
    stop_signal: SIGTERM
    depends_on:
      app:
        condition: service_healthy
    networks: *default-network
    healthcheck:
      test: ["CMD", "healthcheck-schedule"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 2

  reverb:
    <<: *base
    command: ["php", "/var/www/html/artisan", "reverb:start", "--port=8080"]
    stop_signal: SIGTERM
    depends_on:
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD", "healthcheck-reverb"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 2
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.pingcrm-reverb.rule: "Host(`${APP_HOST}`) && (PathPrefix(`/app`) || PathPrefix(`/apps`))"
      traefik.http.services.pingcrm-reverb.loadbalancer.server.port: "8080"

  ssr:
    <<: *base
    command: ["php", "/var/www/html/artisan", "inertia:start-ssr", "--runtime=bun"]
    stop_signal: SIGTERM
    networks: *default-network
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:13714/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 2

  valkey:
    image: 'valkey/valkey:9-alpine'
    ulimits:
      nofile:
        soft: 20000
        hard: 40000
    command: [ "valkey-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "2gb" ]
    security_opt:
      - no-new-privileges:true
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    volumes:
      - 'stack-valkey:/data'
      - 'backup_dumps:/dumps'
    logging: *default-logging
    networks: *default-network
    healthcheck:
      test: [ "CMD", "valkey-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      retries: 3
      timeout: 5s
    labels:
      - docker-volume-backup.archive-pre=/bin/sh -c 'valkey-cli -a $$REDIS_PASSWORD BGSAVE && sleep 2 && cp /data/dump.rdb /dumps/valkey.rdb'
    restart: always

  mariadb:
    image: mariadb:11.8
    ulimits:
      nofile:
        soft: 20000
        hard: 40000
    security_opt:
      - no-new-privileges:true
    environment:
      MARIADB_RANDOM_ROOT_PASSWORD: "1"
      MARIADB_DATABASE: "${DB_DATABASE}"
      MARIADB_USER: "${DB_USERNAME}"
      MARIADB_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - 'stack-mariadb:/var/lib/mysql'
      - 'backup_dumps:/dumps'
    networks: *default-network
    logging: *default-logging
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - docker-volume-backup.archive-pre=/bin/sh -c 'mariadb-dump -u $$MARIADB_USER -p$$MARIADB_PASSWORD --single-transaction $$MARIADB_DATABASE > /dumps/mariadb.sql'
    restart: always

  typesense:
    image: 'typesense/typesense:30.2-arm64-lg-page16'
    command: ["--data-dir=/data", "--api-key=${TYPESENSE_API_KEY}", "--enable-cors"]
    security_opt:
      - no-new-privileges:true
    environment:
      TYPESENSE_API_KEY: "${TYPESENSE_API_KEY}"
    volumes:
      - 'stack-typesense:/data'
    logging:
      driver: 'json-file'
      options:
        max-size: "50m"
        max-file: "6"
    networks:
      - internal
    restart: always

  backup:
    image: offen/docker-volume-backup:v2
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    environment:
      # S3 / S3-compatible
      AWS_S3_BUCKET_NAME: "${BACKUP_S3_BUCKET:-}"
      AWS_S3_PATH: "${BACKUP_S3_PATH:-}"
      AWS_ACCESS_KEY_ID: "${BACKUP_AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${BACKUP_AWS_SECRET_ACCESS_KEY:-}"
      AWS_ENDPOINT: "${BACKUP_AWS_ENDPOINT:-}"
      # Dropbox
      DROPBOX_REMOTE_PATH: "${BACKUP_DROPBOX_REMOTE_PATH:-}"
      DROPBOX_APP_KEY: "${BACKUP_DROPBOX_APP_KEY:-}"
      DROPBOX_APP_SECRET: "${BACKUP_DROPBOX_APP_SECRET:-}"
      DROPBOX_REFRESH_TOKEN: "${BACKUP_DROPBOX_REFRESH_TOKEN:-}"
      AWS_DEFAULT_REGION: "${BACKUP_AWS_DEFAULT_REGION:-}"
      # Common
      BACKUP_CRON_EXPRESSION: "0 3 * * *"
      BACKUP_RETENTION_DAYS: "${BACKUP_RETENTION_DAYS:-7}"
    volumes:
      - backup_dumps:/backup/dumps:ro
      - storage_logs:/backup/logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: *default-network
    logging: *default-logging
    restart: always

networks:
  internal:
  proxy:
    external: true

volumes:
  storage_private:
  storage_public:
  storage_sessions:
  storage_logs:
  stack-valkey:
  stack-mariadb:
  stack-typesense:
  backup_dumps:

# Le contenu du .env Laravel est livré en secret Docker, sourcé depuis la variable
# d'environnement LARAVEL_ENV posée par le pipeline (`export LARAVEL_ENV="$(cat .env.production)"`).
# Compose transmet la valeur au démon distant (DOCKER_HOST=ssh://) : rien n'est écrit
# sur le serveur, et l'interpolation phpdotenv (${APP_HOST}, …) reste intacte côté app.
secrets:
  laravel_env:
    environment: LARAVEL_ENV
