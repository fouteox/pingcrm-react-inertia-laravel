name: CI

on:
    pull_request:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    php:
        name: PHP (Pint + Pest)
        runs-on: ubuntu-24.04

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                persist-credentials: false

            - name: Reject production env secrets in workflows
              run: |
                  forbidden='ENV_FILE_'
                  if git grep -n "${forbidden}BASE64" -- .github/workflows; then
                      echo '::error::Production runtime environments must never be CI build inputs.'
                      exit 1
                  fi

            - name: Setup PHP
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: '8.5'
                  extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_sqlite, sqlite3, bcmath, intl
                  coverage: none
                  tools: composer:v2

            - name: Install Composer dependencies
              uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

            - name: Prepare Laravel environment
              run: |
                  cp .env.example .env
                  php artisan key:generate --force --ansi

            - name: Run Pint
              run: vendor/bin/pint --test --format agent

            - name: Run Pest tests
              run: php artisan test --compact --testsuite=Unit,Feature,Arch

    browser:
        name: Browser (Pest 4)
        runs-on: ubuntu-24.04

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                persist-credentials: false

            - name: Setup PHP
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: '8.5'
                  extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_sqlite, sqlite3, bcmath, intl
                  coverage: none
                  tools: composer:v2

            - name: Install Composer dependencies
              uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

            - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
              with:
                  node-version-file: .node-version
                  cache: true

            - name: Prepare Laravel environment (Wayfinder needs a booted app)
              run: |
                  cp .env.example .env
                  php artisan key:generate --force --ansi

            - name: Build Vite assets
              run: vp run build

            - name: Install Playwright Chromium
              run: npx playwright install --with-deps chromium

            - name: Run Browser tests
              run: php artisan test --compact --testsuite=Browser

    frontend:
        name: Frontend (Types + Lint + Format)
        runs-on: ubuntu-24.04

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                persist-credentials: false

            - name: Setup PHP
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: '8.5'
                  extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_sqlite, sqlite3, bcmath, intl
                  coverage: none
                  tools: composer:v2

            - name: Install Composer dependencies
              uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

            - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
              with:
                  node-version-file: .node-version
                  cache: true

            - name: Prepare Laravel environment (Wayfinder needs a booted app + DB schema)
              # .env.example points at PostgreSQL which is not available in CI, so
              # override to SQLite locally for the tsc/lint/format checks.
              # Production parity (Wayfinder types from PostgreSQL) is enforced in
              # the build workflow.
              run: |
                  cp .env.example .env
                  sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
                  sed -i 's|^DB_DATABASE=.*|DB_DATABASE=database/database.sqlite|' .env
                  php artisan key:generate --force --ansi
                  touch database/database.sqlite
                  php artisan migrate --force --ansi

            - name: Generate Wayfinder TypeScript files
              run: php artisan wayfinder:generate --no-interaction

            - name: Type check
              run: vp run types

            - name: Lint check
              run: vp run lint:check

            - name: Format check
              run: vp run format:check

    build:
        name: Build (Vite production bundle)
        runs-on: ubuntu-24.04

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                persist-credentials: false

            - name: Setup PHP
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: '8.5'
                  extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_sqlite, sqlite3, bcmath, intl
                  coverage: none
                  tools: composer:v2

            - name: Install Composer dependencies
              uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

            - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
              with:
                  node-version-file: .node-version
                  cache: true

            - name: Prepare Laravel environment (Wayfinder needs a booted app)
              run: |
                  cp .env.example .env
                  php artisan key:generate --force --ansi

            - name: Build production bundle
              run: vp run build

    zizmor:
        name: zizmor (audit workflows)
        runs-on: ubuntu-24.04

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                persist-credentials: false

            # ≥ 1.28.0 obligatoire : la 1.27.0 loggait les credentials en
            # clair (GHSA-f42p-wjw5-97qh). Bloquant via annotations + exit
            # codes ; le mode SARIF (advanced-security) ne fait jamais
            # échouer le job.
            - uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
              with:
                version: v1.28.0
                persona: regular
                advanced-security: false
                annotations: true
