name: CI

on:
    pull_request:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    php:
        name: PHP (Pint + Pest)
        runs-on: ubuntu-24.04

        steps:
            - uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_sqlite, sqlite3, bcmath, intl
                  coverage: none
                  tools: composer:v2

            - name: Install Composer dependencies
              uses: ramsey/composer-install@v3

            - name: Prepare Laravel environment
              run: |
                  cp .env.example .env
                  php artisan key:generate --force --ansi

            - name: Run Pint
              run: vendor/bin/pint --test --format agent

            - name: Run Pest tests
              run: php artisan test --compact --testsuite=Unit,Feature,Arch

    browser:
        name: Browser (Pest 4)
        runs-on: ubuntu-24.04

        steps:
            - uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_sqlite, sqlite3, bcmath, intl
                  coverage: none
                  tools: composer:v2

            - name: Install Composer dependencies
              uses: ramsey/composer-install@v3

            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: .node-version
                  cache: true

            - name: Prepare Laravel environment (Wayfinder needs a booted app)
              run: |
                  cp .env.example .env
                  php artisan key:generate --force --ansi

            - name: Build Vite assets
              run: vp run build

            - name: Install Playwright Chromium
              run: npx playwright install --with-deps chromium

            - name: Run Browser tests
              run: php artisan test --compact --testsuite=Browser

    frontend:
        name: Frontend (Types + Lint + Format)
        runs-on: ubuntu-24.04

        steps:
            - uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_sqlite, sqlite3, bcmath, intl
                  coverage: none
                  tools: composer:v2

            - name: Install Composer dependencies
              uses: ramsey/composer-install@v3

            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: .node-version
                  cache: true

            - name: Prepare Laravel environment (Wayfinder needs a booted app + DB schema)
              # .env.example points at MariaDB which is not available in CI, so
              # override to SQLite locally for the tsc/lint/format checks.
              # Production parity (Wayfinder types from MariaDB) is enforced in
              # the deploy workflow.
              run: |
                  cp .env.example .env
                  sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
                  sed -i 's|^DB_DATABASE=.*|DB_DATABASE=database/database.sqlite|' .env
                  php artisan key:generate --force --ansi
                  touch database/database.sqlite
                  php artisan migrate --force --ansi

            - name: Generate Wayfinder TypeScript files
              run: php artisan wayfinder:generate --no-interaction

            - name: Type check
              run: vp run types

            - name: Lint check
              run: vp run lint:check

            - name: Format check
              run: vp run format:check

    build:
        name: Build (Vite production bundle)
        runs-on: ubuntu-24.04

        steps:
            - uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_sqlite, sqlite3, bcmath, intl
                  coverage: none
                  tools: composer:v2

            - name: Install Composer dependencies
              uses: ramsey/composer-install@v3

            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: .node-version
                  cache: true

            - name: Prepare Laravel environment (Wayfinder needs a booted app)
              run: |
                  cp .env.example .env
                  php artisan key:generate --force --ansi

            - name: Build production bundle
              run: vp run build
