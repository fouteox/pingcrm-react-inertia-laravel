name: Build Image

# Reusable build workflow (SLSA Build L3): running the build here gives the
# keyless certificate a builder identity of its own (job_workflow_ref points
# at this file instead of the trigger workflow). The cluster's
# ClusterImagePolicy and the in-workflow verifications below pin this file.
on:
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ${{ vars.SYSTEM_ARCH == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    services:
      # Wayfinder (dev-next) introspects the live DB schema at generate time.
      # Running against the same engine as production (PostgreSQL) is required so
      # generated TS types match runtime PDO behaviour (column types are engine
      # specific).
      postgres:
        # Tag lisible + digest multi-architecture immuable ; Renovate suit les
        # reconstructions de postgres:18 via le preset docker:pinDigests.
        image: postgres:18@sha256:3a82e1f56c8f0f5616a11103ac3d47e632c3938698946a7ad26da0df1334744a
        env:
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: pingcrm
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_DATABASE: pingcrm
      DB_USERNAME: postgres
      DB_PASSWORD: secret
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_pgsql, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies (no-dev — matches production)
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0
        with:
          composer-options: '--no-dev'
          # Pas de cache dans le workflow qui publie l'image signée :
          # un cache empoisonnable ne doit pas alimenter un artefact de
          # release (zizmor cache-poisoning).
          ignore-cache: '1'

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version-file: .node-version
          cache: true

      # Use only versioned, non-production defaults plus the isolated PostgreSQL
      # service above. The generated APP_KEY lives for this job only.
      - name: Prepare isolated env, migrate PostgreSQL and pre-build assets
        env:
          APP_ENV: production
          APP_DEBUG: 'false'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: log
        run: |
          umask 077
          cp .env.example .env
          php artisan key:generate --force --ansi
          php artisan migrate --force --no-interaction
          vp install --frozen-lockfile
          vp run build:ssr

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.2

      - name: Build and push App image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: app
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max,version=v1
          sbom: true
          # Scheduled runs bypass the layer cache and re-pull bases: a cached
          # rebuild would reuse the old (potentially vulnerable) layers and
          # defeat the purpose. cache-to still refreshes the cache for the
          # week's push builds.
          no-cache: ${{ github.event_name == 'schedule' }}
          pull: ${{ github.event_name == 'schedule' }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # Public repositories can use GitHub's hosted attestation service. Built
      # from a reusable workflow, it provides Build Level 3 provenance in
      # addition to the BuildKit/Cosign bundle retained below for the current
      # cluster admission policy.
      - name: Attest image with GitHub
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Verify GitHub artifact attestation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://$IMAGE@$DIGEST" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/build-image.yml" \
            --deny-self-hosted-runners \
            --bundle-from-oci

      # Keep the plain OCI 1.1 signature and add a signed SLSA v1 provenance
      # bundle that policy-controller can enforce natively. The certificate
      # identity is job.workflow_ref: for a job defined in a reusable workflow
      # it references this file, exactly like the Fulcio SAN.
      - name: Sign, attest, verify and publish image tags
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}
          CERTIFICATE_IDENTITY: https://github.com/${{ job.workflow_ref }}
          EXPECTED_BUILDER_ID: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}
        run: |
          set -euo pipefail
          image_ref="$IMAGE@$DIGEST"
          provenance_path="$RUNNER_TEMP/provenance-${DIGEST#sha256:}.json"

          docker buildx imagetools inspect "$image_ref" \
            --format '{{ json .Provenance.SLSA }}' > "$provenance_path"
          actual_builder_id="$(docker buildx imagetools inspect "$image_ref" \
            --format '{{ .Provenance.SLSA.runDetails.builder.id }}')"
          build_type="$(docker buildx imagetools inspect "$image_ref" \
            --format '{{ .Provenance.SLSA.buildDefinition.buildType }}')"
          finished_on="$(docker buildx imagetools inspect "$image_ref" \
            --format '{{ .Provenance.SLSA.runDetails.metadata.finishedOn }}')"

          [[ "$actual_builder_id" == "$EXPECTED_BUILDER_ID" ]]
          [[ "$build_type" == "https://github.com/moby/buildkit/blob/master/docs/attestations/slsa-definitions.md" ]]
          [[ -n "$finished_on" && "$finished_on" != "<nil>" && "$finished_on" != "<no value>" ]]

          cosign sign --yes "$image_ref"
          cosign verify \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$image_ref" >/dev/null

          cosign attest --yes \
            --predicate "$provenance_path" \
            --type slsaprovenance1 \
            "$image_ref"
          cosign verify-attestation \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --type slsaprovenance1 \
            "$image_ref" >/dev/null

          docker buildx imagetools create \
            --tag "$IMAGE:latest" \
            --tag "$IMAGE:${{ github.sha }}-app" \
            --tag "$IMAGE:run-${{ github.run_number }}.${{ github.run_attempt }}.0" \
            "$image_ref"

      # Le Receiver Flux authentifie ce workflow avec le JWT OIDC éphémère ;
      # aucun secret webhook longue durée n'est stocké dans GitHub Actions.
      - name: Notify Flux image automation
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          FLUX_WEBHOOK_URL: https://flux-webhook.florianoster.com/hook/254e94b07f012e3ecc5b179910a1da8aaa952c1ba87a3e00f41d653aaf50fc0c
        with:
          script: |
            const token = await core.getIDToken('notification-controller')
            const response = await fetch(process.env.FLUX_WEBHOOK_URL, {
              method: 'POST',
              headers: { Authorization: `Bearer ${token}` },
            })

            if (!response.ok) {
              throw new Error(`Flux webhook returned HTTP ${response.status}: ${await response.text()}`)
            }

      - name: Cleanup isolated build env
        if: always()
        run: rm -f .env
