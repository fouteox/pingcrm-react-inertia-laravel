name: Build and Deploy

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ${{ vars.SYSTEM_ARCH == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    services:
      # Wayfinder (dev-next) introspects the live DB schema at generate time.
      # Running against the same engine as production (MariaDB) is required so
      # generated TS types match runtime PDO behaviour (e.g. INT columns are
      # returned as `string` by MariaDB but `number` by SQLite).
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: secret
          MARIADB_DATABASE: pingcrm
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_DATABASE: pingcrm
      DB_USERNAME: root
      DB_PASSWORD: secret
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_mysql, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies (no-dev — matches production)
        uses: ramsey/composer-install@v3
        with:
          composer-options: '--no-dev'

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .nvmrc
          cache: true

      - name: Load env, migrate MariaDB and pre-build assets
        run: |
          echo "${{ secrets.ENV_FILE_BASE64 }}" | base64 -d > .env
          php artisan key:generate --force --ansi
          php artisan migrate --force --no-interaction
          vp install
          vp run build:ssr

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push App image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: app
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-app
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Cleanup pre-build env
        if: always()
        run: rm -f .env

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      USE_CF_TUNNEL: ${{ secrets.USE_CLOUDFLARE_TUNNEL }}

    steps:
      - uses: actions/checkout@v6

      - name: Load .env.production and export variables
        run: |
          echo "${{ secrets.ENV_FILE_BASE64 }}" | base64 -d > .env.production

          # Export every variable (masked) for compose substitution and first-deploy
          # detection in the next step. The full file is delivered to the containers
          # as a Docker secret (see the deploy step), not exported here.
          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            if [[ $line =~ ^([A-Za-z_][A-Za-z0-9_]*)=(.*)$ ]]; then
              key="${BASH_REMATCH[1]}"
              value="${BASH_REMATCH[2]}"
              value=$(echo "$value" | sed -e 's/^"//' -e 's/"$//')
              echo "::add-mask::$value"
              echo "$key=$value" >> $GITHUB_ENV
            fi
          done < .env.production

          echo "IMAGE_NAME=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_ENV

      - name: Install cloudflared
        if: env.USE_CF_TUNNEL == 'true'
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          name: id_ed25519
          known_hosts: unnecessary
          config: |
            Host deploy-target
              HostName ${{ secrets.SSH_HOST }}
              User ${{ secrets.SSH_USER }}
              IdentityFile ~/.ssh/id_ed25519
              StrictHostKeyChecking accept-new
              ${{ env.USE_CF_TUNNEL == 'true' && 'ProxyCommand cloudflared access ssh --hostname %h' || format('Port {0}', secrets.SSH_PORT) }}

      # Deploy by driving the REMOTE Docker daemon over SSH (DOCKER_HOST=ssh://).
      # Nothing is copied to the server: compose files and .env stay on the runner,
      # compose only sends API calls. The Laravel .env is delivered as an env-sourced
      # Docker secret (LARAVEL_ENV) — its content is transmitted to the remote daemon
      # and mounted at /var/www/html/.env, never written to the server filesystem.
      - name: Deploy to remote Docker daemon (no project copy)
        env:
          DOCKER_HOST: ssh://deploy-target
        run: |
          set -e

          # Whole Laravel .env → Docker secret value (raw content keeps phpdotenv
          # interpolation like ${APP_HOST} intact for the app to resolve at runtime).
          export LARAVEL_ENV="$(cat .env.production)"

          PROJECT="${COMPOSE_PROJECT_NAME:-${{ github.event.repository.name }}}"

          # Add the Let's Encrypt certresolver overlay unless behind a Cloudflare Tunnel.
          COMPOSE_FILES=(-f compose.prod.yaml)
          if [ "${USE_CF_TUNNEL}" != "true" ]; then
            COMPOSE_FILES+=(-f compose.prod.certresolver.yaml)
          fi
          DC=(docker compose -p "$PROJECT" "${COMPOSE_FILES[@]}" --env-file .env.production)

          DB="${DB_CONNECTION:-}"
          CACHE="${REDIS_HOST:-}"

          # First deploy = the DB data volume does not exist yet on the remote host
          FIRST_DEPLOY="no"
          if [ -n "$DB" ] && [ "$DB" != "sqlite" ] && ! docker volume inspect "${PROJECT}_stack-${DB}" > /dev/null 2>&1; then
            FIRST_DEPLOY="yes"
          fi

          echo "==> Logging in to ${{ env.REGISTRY }} and pulling images on the remote..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          "${DC[@]}" pull

          # === First-deploy backup restore (S3 or Dropbox, via rclone) ===
          # Best-effort: a failure here never blocks the deployment. rclone is
          # configured through RCLONE_CONFIG_* env vars (no config file to place on
          # the server) and all I/O targets remote named volumes.
          if [ "$FIRST_DEPLOY" = "yes" ]; then
            echo "==> First deploy detected, looking for a backup to restore..."
            (
              set -e
              RCLONE_ENV=()
              REMOTE_PATH=""

              if [ -n "${BACKUP_S3_BUCKET:-}" ]; then
                echo "Backup provider: S3"
                RCLONE_ENV=(
                  -e RCLONE_CONFIG_BACKUP_TYPE=s3
                  -e RCLONE_CONFIG_BACKUP_PROVIDER=Other
                  -e "RCLONE_CONFIG_BACKUP_ACCESS_KEY_ID=${BACKUP_AWS_ACCESS_KEY_ID}"
                  -e "RCLONE_CONFIG_BACKUP_SECRET_ACCESS_KEY=${BACKUP_AWS_SECRET_ACCESS_KEY}"
                  -e "RCLONE_CONFIG_BACKUP_ENDPOINT=https://${BACKUP_AWS_ENDPOINT:-s3.amazonaws.com}"
                )
                REMOTE_PATH="${BACKUP_S3_BUCKET}/${BACKUP_S3_PATH:-}"

              elif [ -n "${BACKUP_DROPBOX_REFRESH_TOKEN:-}" ]; then
                echo "Backup provider: Dropbox"
                # rclone strips refresh_token from config, so mint a short-lived access_token
                TOKEN_RESPONSE=$(curl -s -X POST https://api.dropboxapi.com/oauth2/token \
                  -d grant_type=refresh_token \
                  -d "refresh_token=${BACKUP_DROPBOX_REFRESH_TOKEN}" \
                  -d "client_id=${BACKUP_DROPBOX_APP_KEY}" \
                  -d "client_secret=${BACKUP_DROPBOX_APP_SECRET}")
                ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token // empty')
                if [ -z "$ACCESS_TOKEN" ]; then
                  echo "Failed to obtain a Dropbox access token"; exit 1
                fi
                RCLONE_ENV=(
                  -e RCLONE_CONFIG_BACKUP_TYPE=dropbox
                  -e "RCLONE_CONFIG_BACKUP_TOKEN={\"access_token\":\"${ACCESS_TOKEN}\",\"token_type\":\"bearer\"}"
                )
                REMOTE_PATH="${BACKUP_DROPBOX_REMOTE_PATH#/}"

              else
                echo "No backup provider configured, skipping restore."; exit 0
              fi

              rclone_run() {
                docker run --rm "${RCLONE_ENV[@]}" \
                  -v "${PROJECT}_backup_dumps:/restore" \
                  rclone/rclone "$@"
              }

              LATEST=$(rclone_run lsf "backup:${REMOTE_PATH}/" --files-only 2>/dev/null | grep '\.tar\.gz' | sort | tail -1 || true)
              if [ -z "$LATEST" ]; then
                echo "No backup archive found, skipping restore."; exit 0
              fi
              echo "Restoring from: $LATEST"

              # Download the archive into the backup_dumps volume and extract the dumps
              rclone_run copy "backup:${REMOTE_PATH}/$LATEST" /restore/
              docker run --rm -v "${PROJECT}_backup_dumps:/restore" alpine sh -c \
                "mv '/restore/$LATEST' /restore/backup.tar.gz && \
                 tar -xzf /restore/backup.tar.gz -C /restore --strip-components=2 backup/dumps/ && \
                 rm -f /restore/backup.tar.gz"

              # Restore the database into a freshly started container
              if [ -n "$DB" ] && [ "$DB" != "sqlite" ]; then
                echo "Starting $DB and importing the dump..."
                "${DC[@]}" up -d --wait "$DB"
                case "$DB" in
                  mariadb)
                    "${DC[@]}" exec -T mariadb sh -c \
                      'mariadb -u"$MARIADB_USER" -p"$MARIADB_PASSWORD" "$MARIADB_DATABASE" < /dumps/mariadb.sql' < /dev/null
                    ;;
                  mysql)
                    "${DC[@]}" exec -T mysql sh -c \
                      'mysql -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" "$MYSQL_DATABASE" < /dumps/mysql.sql' < /dev/null
                    ;;
                  pgsql)
                    "${DC[@]}" exec -T pgsql pg_restore -U "${DB_USERNAME}" -d "${DB_DATABASE}" \
                      -c --if-exists /dumps/pgsql.dump < /dev/null
                    ;;
                esac
              fi

              # Restore the cache snapshot before its first start
              if [ -n "$CACHE" ]; then
                echo "Restoring $CACHE snapshot..."
                "${DC[@]}" create "$CACHE" 2>/dev/null || true
                docker run --rm \
                  -v "${PROJECT}_backup_dumps:/source:ro" \
                  -v "${PROJECT}_stack-${CACHE}:/data" \
                  alpine sh -c "cp /source/${CACHE}.rdb /data/dump.rdb 2>/dev/null || cp /source/redis.rdb /data/dump.rdb 2>/dev/null || true"
                "${DC[@]}" up -d --wait "$CACHE"
              fi
            ) || echo "==> Backup restore skipped or failed (non-fatal), continuing deploy."
          fi

          echo "==> Starting all services on the remote..."
          "${DC[@]}" up -d --wait --remove-orphans
          echo "==> Deployment complete!"

      - name: Cleanup .env.production
        if: always()
        run: rm -f .env.production
