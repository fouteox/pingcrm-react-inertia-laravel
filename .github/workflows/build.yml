name: Build and Push

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly security rebuild (Mondays 05:00 UTC, staggered after fadogen and
    # footeox): base images ship security fixes under the SAME tag — they only
    # reach us on a fresh build. The run produces a new run-N tag, so Flux
    # Image Automation rolls it out.
    - cron: '0 5 * * 1'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ${{ vars.SYSTEM_ARCH == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      id-token: write
      packages: write
    services:
      # Wayfinder (dev-next) introspects the live DB schema at generate time.
      # Running against the same engine as production (PostgreSQL) is required so
      # generated TS types match runtime PDO behaviour (column types are engine
      # specific).
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: pingcrm
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_DATABASE: pingcrm
      DB_USERNAME: postgres
      DB_PASSWORD: secret
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_pgsql, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies (no-dev — matches production)
        uses: ramsey/composer-install@v4
        with:
          composer-options: '--no-dev'

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true

      - name: Load env, migrate PostgreSQL and pre-build assets
        run: |
          echo "${{ secrets.ENV_FILE_BASE64 }}" | base64 -d > .env
          php artisan key:generate --force --ansi
          php artisan migrate --force --no-interaction
          vp install
          vp run build:ssr

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push App image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          target: app
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-app
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:run-${{ github.run_number }}
          # Scheduled runs bypass the layer cache and re-pull bases: a cached
          # rebuild would reuse the old (potentially vulnerable) layers and
          # defeat the purpose. cache-to still refreshes the cache for the
          # week's push builds.
          no-cache: ${{ github.event_name == 'schedule' }}
          pull: ${{ github.event_name == 'schedule' }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # Le Receiver Flux authentifie ce workflow avec le JWT OIDC éphémère ;
      # aucun secret webhook longue durée n'est stocké dans GitHub Actions.
      - name: Notify Flux image automation
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          FLUX_WEBHOOK_URL: https://flux-webhook.florianoster.com/hook/254e94b07f012e3ecc5b179910a1da8aaa952c1ba87a3e00f41d653aaf50fc0c
        with:
          script: |
            const token = await core.getIDToken('notification-controller')
            const response = await fetch(process.env.FLUX_WEBHOOK_URL, {
              method: 'POST',
              headers: { Authorization: `Bearer ${token}` },
            })

            if (!response.ok) {
              throw new Error(`Flux webhook returned HTTP ${response.status}: ${await response.text()}`)
            }

      - name: Cleanup pre-build env
        if: always()
        run: rm -f .env
